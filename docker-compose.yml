version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://mira:mira_password@db:5432/mira_db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-change-in-production}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=mira
      - POSTGRES_PASSWORD=mira_password
      - POSTGRES_DB=mira_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mira -d mira_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Database migrations job (run once)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx prisma migrate deploy
    environment:
      - DATABASE_URL=postgresql://mira:mira_password@db:5432/mira_db
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
