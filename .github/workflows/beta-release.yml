name: Build and push beta image

on:
  push:
    branches:
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ -f "package.json" ]; then
            VERSION=$(node -p "require('./package.json').version")
          elif [ -f ".version" ]; then
            VERSION=$(cat .version | tr -d '[:space:]')
          elif [ -f "pyproject.toml" ]; then
            VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          elif [ -f "mix.exs" ]; then
            VERSION=$(grep 'version:' mix.exs | head -1 | sed 's/.*version: "\(.*\)".*/\1/')
          else
            echo "No version file found"
            exit 1
          fi

          # Bump the minor version and reset patch to 0
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          BUMPED_MINOR=$((MINOR + 1))
          NEXT_VERSION="${MAJOR}.${BUMPED_MINOR}.0"

          echo "version=${NEXT_VERSION}" >> $GITHUB_OUTPUT

      - name: Get beta build number
        id: beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          NEXT_VERSION="${{ steps.version.outputs.version }}"
          BASE_TAG="${NEXT_VERSION}-beta"

          # Fetch all tags from GHCR matching the base beta tag pattern
          # and find the highest build number
          EXISTING=$(gh api \
            "/orgs/$(echo $REPO | cut -d/ -f1)/packages/container/$(echo $REPO | cut -d/ -f2)/versions" \
            --paginate \
            --jq '.[].metadata.container.tags[]' 2>/dev/null \
            | grep -E "^${BASE_TAG}\.[0-9]+$" \
            | sed "s/${BASE_TAG}\.//" \
            | sort -n \
            | tail -1)

          if [ -z "$EXISTING" ]; then
            NEXT_NUMBER=1
          else
            NEXT_NUMBER=$((EXISTING + 1))
          fi

          echo "number=${NEXT_NUMBER}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-beta.${{ steps.beta.outputs.number }}
            type=raw,value=beta

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
